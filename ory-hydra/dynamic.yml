# Traefik dynamic configuration — routing rules for MCP + Hydra + Backend API
#
# Architecture:
#   Client → Traefik :5050 → Backend API :5000  (for OAuth metadata, DCR, JWKS proxy)
#                            → MCP server :5051  (for /mcp)
#                            → Hydra :4444       (for /oauth2/*, /userinfo, /.well-known/jwks.json)
#
# Since Hydra's issuer is set to http://localhost:5050, all OIDC metadata URLs
# already point to :5050. Traefik routes them to the correct backend.
# No URL rewriting needed.

http:
  routers:
    # ── Backend API routes (OAuth metadata + DCR) ────────────────────

    # RFC 9728 — OAuth Protected Resource Metadata
    resource-metadata:
      rule: "PathPrefix(`/.well-known/oauth-protected-resource`)"
      entryPoints: ["mcp"]
      service: backend-api
      middlewares: ["cors"]
      priority: 100

    # Authorization server metadata — Backend API fetches from Hydra
    # and injects registration_endpoint (Hydra doesn't advertise it)
    authz-server-metadata:
      rule: "PathPrefix(`/.well-known/oauth-authorization-server`)"
      entryPoints: ["mcp"]
      service: backend-api
      middlewares: ["cors"]
      priority: 100

    openid-configuration:
      rule: "PathPrefix(`/.well-known/openid-configuration`)"
      entryPoints: ["mcp"]
      service: backend-api
      middlewares: ["cors"]
      priority: 100

    # DCR — routed through Backend API for request/response sanitization
    # (Hydra is strict about field types, e.g. contacts must be an array)
    register:
      rule: "Path(`/register`) || Path(`/oauth2/register`)"
      entryPoints: ["mcp"]
      service: backend-api
      middlewares: ["cors"]
      priority: 110

    # ── MCP server routes ──────────────────────────────────────────────

    # MCP protocol — CORS handled by Traefik (ensures headers on all responses,
    # including auth middleware 401s and Traefik-generated 502s)
    mcp:
      rule: "PathPrefix(`/mcp`)"
      entryPoints: ["mcp"]
      service: mcp-server
      middlewares: ["cors"]

    # ── Hydra routes ───────────────────────────────────────────────────

    # All OAuth2 endpoints (token, auth, revoke, register, sessions, etc.)
    oauth2:
      rule: "PathPrefix(`/oauth2`)"
      entryPoints: ["mcp"]
      service: hydra-public
      middlewares: ["cors"]

    # OIDC userinfo
    userinfo:
      rule: "Path(`/userinfo`)"
      entryPoints: ["mcp"]
      service: hydra-public
      middlewares: ["cors"]

    # Catch-all for other .well-known paths (jwks.json, etc.)
    well-known-hydra:
      rule: "PathPrefix(`/.well-known`)"
      entryPoints: ["mcp"]
      service: hydra-public
      middlewares: ["cors"]
      priority: 50

  # ── Services ───────────────────────────────────────────────────────

  services:
    backend-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5000"

    mcp-server:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5051"

    hydra-public:
      loadBalancer:
        servers:
          - url: "http://hydra:4444"

  # ── Middlewares ────────────────────────────────────────────────────

  middlewares:
    cors:
      headers:
        accessControlAllowOriginListRegex:
          - ".*"
        accessControlAllowCredentials: true
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - Mcp-Session-Id
          - Mcp-Protocol-Version
          - Last-Event-Id
        accessControlExposeHeaders:
          - WWW-Authenticate
          - Mcp-Session-Id
          - Mcp-Protocol-Version
        accessControlMaxAge: 86400
        addVaryHeader: true
